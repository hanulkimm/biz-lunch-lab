name: Deploy backend (EC2 via SSM)

# main에 backend 코드(또는 이 워크플로)가 push되면 SSM Run Command로
# EC2에서 재배포 스크립트(/home/ubuntu/deploy-backend.sh)를 실행한다.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  INSTANCE_ID: i-0415979bba6807748

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send redeploy command via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy backend from GitHub Actions" \
            --parameters commands='runuser -l ubuntu -c /home/ubuntu/deploy-backend.sh' \
            --query "Command.CommandId" --output text)
          echo "CMD_ID=$CMD_ID" >> "$GITHUB_ENV"
          echo "Sent SSM command: $CMD_ID"

      - name: Wait for result and print logs
        run: |
          STATUS="Pending"
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] status: $STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
          done
          echo "::group::stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text || true
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text || true
          echo "::endgroup::"
          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ] || { echo "Deploy failed"; exit 1; }
